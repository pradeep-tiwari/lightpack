services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
      - storage:/var/www/html/storage
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
    working_dir: /var/www/html
    environment:
      - APP_ENV=development
    depends_on:
      - db
      - redis

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lightpack
      MYSQL_USER: lightpack
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: lightpack
      PMA_PASSWORD: secret
      PMA_ARBITRARY: 0
    depends_on:
      - db

volumes:
  vendor:
  storage:
  db_data:
